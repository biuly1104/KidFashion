spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
server.servlet.session.timeout=30m

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}
server.forward-headers-strategy=framework

vnpay.tmnCode=${VNPAY_TMN_CODE:DEMOVNPAY}
vnpay.hashSecret=${VNPAY_HASH_SECRET:SECRETKEYVNPAY}
vnpay.payUrl=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}

app.base-url=${APP_BASE_URL:http://localhost:${PORT:8080}}
vnpay.returnUrl=${app.base-url}/payment/vnpay-return