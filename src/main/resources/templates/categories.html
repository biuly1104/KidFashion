<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Quản lý danh mục</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h2 class="mb-1">📂 Quản lý danh mục</h2>
      <p class="text-muted mb-0">Danh sách các danh mục sản phẩm trong hệ thống.</p>
    </div>

    <a th:href="@{/admin/categories/add}" class="btn btn-success">
      + Thêm danh mục
    </a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
        <tr>
          <th class="ps-3">ID</th>
          <th>Tên danh mục</th>
          <th class="text-center">Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(categories)}">
          <td colspan="3" class="text-center py-4 text-muted">
            Chưa có danh mục nào.
          </td>
        </tr>

        <tr th:each="c : ${categories}">
          <td class="ps-3" th:text="${c.id}"></td>
          <td th:text="${c.name}"></td>
          <td class="text-center">
            <a th:href="@{'/admin/categories/edit/' + ${c.id}}"
               class="btn btn-sm btn-warning">
              Sửa
            </a>

            <a th:href="@{'/admin/categories/delete/' + ${c.id}}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
              Xóa
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
