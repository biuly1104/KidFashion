<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top:90px;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2>Danh sách sản phẩm</h2>

    <form method="get" action="/">
        <input type="text" name="keyword" placeholder="Tìm kiếm..." class="form-control mb-2"/>
        <button type="submit" class="btn btn-primary mb-3">Tìm</button>
    </form>

    <a href="/add" class="btn btn-success mb-3">+ Thêm sản phẩm</a>

    <table class="table table-bordered">
        <tr>
            <th>Tên</th>
            <th>Loại</th>
            <th>Giá</th>
            <th>Hành động</th>
        </tr>

        <tr th:each="p : ${listProducts}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.price}"></td>
            <td>
                <a th:href="@{'/edit/' + ${p.id}}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{'/delete/' + ${p.id}}" class="btn btn-danger btn-sm">Xóa</a>
            </td>
        </tr>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
