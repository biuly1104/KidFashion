<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">🧾 Thanh toán</h2>

    <!-- DANH SÁCH SẢN PHẨM -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-0">
            <table class="table table-bordered mb-0 bg-white">
                <thead class="table-dark">
                <tr>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="entry : ${cartItems}">
                    <td th:text="${entry.key.name}"></td>

                    <td th:text="${#numbers.formatDecimal(entry.key.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>

                    <td th:text="${entry.value}"></td>

                    <td th:text="${#numbers.formatDecimal(entry.key.price * entry.value, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MÃ GIẢM GIÁ -->
    <div class="card p-3 shadow-sm border-0 mb-4">
        <h4 class="mb-3">🎁 Mã giảm giá</h4>

        <form th:action="@{/checkout/apply-discount}" method="post" class="row g-2">
            <div class="col-md-9">
                <input type="text" name="code" class="form-control" placeholder="Nhập mã giảm giá">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-warning w-100">Áp dụng</button>
            </div>
        </form>

        <div th:if="${success != null}" class="alert alert-success mt-3 mb-0" th:text="${success}"></div>
        <div th:if="${error != null}" class="alert alert-danger mt-3 mb-0" th:text="${error}"></div>
    </div>

    <!-- FORM THANH TOÁN -->
    <form th:action="@{/checkout/confirm}" method="post">

        <div class="card p-4 shadow-sm border-0">

            <h4 class="mb-3">Thông tin khách hàng</h4>

            <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <input type="text" name="address" class="form-control" required>
            </div>

            <h4 class="mt-3 mb-3">Phương thức thanh toán</h4>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="payment" value="COD" checked>
                <label class="form-check-label">Thanh toán khi nhận hàng (COD)</label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="payment" value="BANK">
                <label class="form-check-label">Chuyển khoản ngân hàng</label>
            </div>

            <hr>

            <div class="d-flex justify-content-between mb-2">
                <span>Tổng tiền hàng:</span>
                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
            </div>

            <div class="d-flex justify-content-between mb-2">
                <span>Giảm giá:</span>
                <span class="text-success"
                      th:text="'- ' + ${#numbers.formatDecimal(discountAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
            </div>

            <div class="d-flex justify-content-between">
                <h4 class="mb-0">Thành tiền:</h4>
                <h4 class="text-danger mb-0"
                    th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                </h4>
            </div>

            <div class="text-end mt-4">
                <button type="submit" class="btn btn-success btn-lg">
                    ✅ Đặt hàng
                </button>
            </div>

        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
