<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">🛒 Giỏ hàng</h2>
            <p class="text-muted mb-0">Kiểm tra sản phẩm trước khi tiến hành thanh toán.</p>
        </div>

        <a href="/products" class="btn btn-outline-primary">
            ← Tiếp tục mua sắm
        </a>
    </div>

    <!-- Nếu giỏ trống -->
    <div th:if="${#maps.isEmpty(cartItems)}" class="card shadow-sm border-0">
        <div class="card-body text-center p-5">
            <h4 class="mb-3">Giỏ hàng hiện chưa có sản phẩm</h4>
            <p class="text-muted mb-4">
                Hãy thêm sản phẩm bạn thích vào giỏ để tiếp tục đặt hàng.
            </p>
            <a href="/products" class="btn btn-primary btn-lg">Xem sản phẩm</a>
        </div>
    </div>

    <!-- Nếu có sản phẩm -->
    <div th:if="${!#maps.isEmpty(cartItems)}">

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="entry : ${cartItems}">
                        <td class="ps-4 fw-semibold" th:text="${entry.key.name}"></td>

                        <td class="text-danger fw-bold"
                            th:text="${#numbers.formatDecimal(entry.key.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                        </td>

                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <a th:href="@{'/cart/decrease/' + ${entry.key.id}}"
                                   class="btn btn-sm btn-outline-secondary">-</a>

                                <span class="fw-bold" th:text="${entry.value}"></span>

                                <a th:href="@{'/cart/increase/' + ${entry.key.id}}"
                                   class="btn btn-sm btn-outline-secondary">+</a>
                            </div>
                        </td>

                        <td class="text-center">
                            <a th:href="@{'/cart/remove/' + ${entry.key.id}}"
                               class="btn btn-sm btn-danger">
                                Xóa
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tổng tiền + Thanh toán -->
        <div class="card mt-4 p-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1">Tổng tiền</h4>
                    <p class="text-muted mb-0">Xác nhận giỏ hàng trước khi sang bước thanh toán.</p>
                </div>

                <h3 class="text-danger mb-0"
                    th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                </h3>
            </div>

            <div class="text-end mt-4">
                <form action="/checkout" method="get">
                    <button type="submit" class="btn btn-success btn-lg">
                        🧾 Tiến hành thanh toán
                    </button>
                </form>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
