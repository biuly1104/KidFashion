<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: #f7f7fb;
    }

    .page-title {
        font-size: 36px;
        font-weight: 800;
        color: #1f2937;
    }

    .toolbar-card {
        border: none;
        border-radius: 22px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }

    .product-card {
        border: none;
        border-radius: 22px;
        overflow: hidden;
        background: #fff;
        transition: .25s ease;
        box-shadow: 0 12px 28px rgba(0,0,0,0.06);
    }

    .product-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 36px rgba(0,0,0,0.10);
    }

    .product-card img {
        height: 230px;
        object-fit: cover;
    }

    .product-link {
        text-decoration: none;
        color: inherit;
    }

    .product-link:hover {
        color: inherit;
    }

    .price {
        color: #ef4444;
        font-weight: 800;
        font-size: 22px;
        margin-bottom: 0;
    }

    .action-btn {
        border-radius: 14px;
        padding: 11px 14px;
        font-weight: 600;
    }

    .product-box {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .product-actions {
        margin-top: 12px;
    }

    .pagination .page-link {
        border: none;
        border-radius: 14px;
        margin: 0 4px;
        color: #1f2937;
        box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }

    .pagination .page-item.active .page-link {
        background: #111827;
        color: #fff;
    }

    .pagination .page-link:hover {
        background: #ececec;
        color: #111827;
    }

    .pagination .page-item.disabled .page-link {
        background: #f1f1f1;
        color: #9ca3af;
        box-shadow: none;
    }
  </style>
</head>

<body style="padding-top:95px;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4 mb-5">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <div class="page-title">Sản phẩm</div>
      <p class="text-muted mb-0">Khám phá những mẫu quần áo dễ thương cho bé.</p>
    </div>
  </div>

  <div class="toolbar-card p-4 mb-4">
    <form th:action="@{/products}" method="get" class="row g-3 align-items-center">
      <div class="col-md-3">
        <select name="categoryId" class="form-select rounded-4">
          <option value="">Tất cả danh mục</option>
          <option th:each="c : ${categories}"
                  th:value="${c.id}"
                  th:text="${c.name}"
                  th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">
          </option>
        </select>
      </div>

      <div class="col-md-6">
        <input type="text"
               name="keyword"
               th:value="${keyword}"
               class="form-control rounded-4"
               placeholder="Tìm sản phẩm theo tên...">
      </div>

      <div class="col-md-3 d-flex gap-2">
        <button type="submit" class="btn btn-dark rounded-pill px-4 w-100">Lọc</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary rounded-pill px-4 w-100">Reset</a>
      </div>
    </form>
  </div>

  <div class="row align-items-stretch">

    <div class="col-md-3 mb-4" th:each="p : ${listProducts}">
      <div class="product-box h-100">

        <a th:href="@{/product/{id}(id=${p.id})}" class="product-link">
          <div class="product-card">
            <img th:src="${p.image != null and !#strings.isEmpty(p.image) ? p.image : 'https://via.placeholder.com/300x230'}"
                 class="w-100"
                 alt="Ảnh sản phẩm">

            <div class="p-4">
              <h5 class="fw-bold mb-3" th:text="${p.name}"></h5>
              <div class="price"
                   th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">
              </div>
            </div>
          </div>
        </a>

        <div class="product-actions">
          <div class="text-center">
            <form th:action="@{/cart/add/{id}(id=${p.id})}" method="post">
              <button type="submit" class="btn btn-primary w-100 action-btn">
                Thêm vào giỏ
              </button>
            </form>
          </div>

          <div class="text-center mt-2" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products/delete/{id}(id=${p.id})}"
               class="btn btn-danger w-100 action-btn"
               onclick="return confirm('Xóa sản phẩm này?')">
              Xóa
            </a>
          </div>
        </div>

      </div>
    </div>

    <div th:if="${#lists.isEmpty(listProducts)}" class="col-12">
      <div class="alert alert-light border rounded-4 text-center p-4">
        Không tìm thấy sản phẩm phù hợp.
      </div>
    </div>

  </div>

  <!-- PHÂN TRANG -->
  <nav th:if="${totalPages > 1}" class="mt-4">
    <ul class="pagination justify-content-center flex-wrap">

      <li class="page-item" th:classappend="${currentPage == 0} ? ' disabled'">
        <a class="page-link"
           th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${selectedCategoryId})}">
          «
        </a>
      </li>

      <li class="page-item"
          th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
          th:classappend="${i == currentPage} ? ' active'">
        <a class="page-link"
           th:text="${i + 1}"
           th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${selectedCategoryId})}">
        </a>
      </li>

      <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? ' disabled'">
        <a class="page-link"
           th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${selectedCategoryId})}">
          »
        </a>
      </li>

    </ul>
  </nav>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
