<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">📦 Đơn hàng của tôi</h2>
            <p class="text-muted mb-0">Danh sách các đơn hàng bạn đã đặt.</p>
        </div>

        <a href="/products" class="btn btn-outline-primary">
            ← Tiếp tục mua sắm
        </a>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="card shadow-sm border-0">
        <div class="card-body text-center p-5">
            <h4 class="mb-3">Bạn chưa có đơn hàng nào</h4>
            <p class="text-muted mb-4">
                Sau khi thanh toán, đơn hàng sẽ hiển thị tại đây.
            </p>
            <a href="/products" class="btn btn-primary btn-lg">Mua ngay</a>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(orders)}">
        <div th:each="order : ${orders}" class="card shadow-sm border-0 mb-4">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <h5 class="mb-2">Mã đơn: <span th:text="${order.id}"></span></h5>
                        <p class="mb-1"><b>Người nhận:</b> <span th:text="${order.customerName}"></span></p>
                        <p class="mb-1"><b>SĐT:</b> <span th:text="${order.phone}"></span></p>
                        <p class="mb-1"><b>Địa chỉ:</b> <span th:text="${order.address}"></span></p>
                        <p class="mb-1"><b>Thanh toán:</b> <span th:text="${order.paymentMethod}"></span></p>
                        <p class="mb-1"><b>Ngày đặt:</b> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
                    </div>

                    <div>
                        <span class="badge bg-success fs-6" th:text="${order.status}"></span>
                    </div>
                </div>

                <hr>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tạm tính</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${order.items}">
                            <td th:text="${item.productName}"></td>
                            <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                            <td th:text="${item.quantity}"></td>
                            <td th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' VND'"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-end">
                    <h5>
                        Tổng tiền:
                        <span class="text-danger fw-bold"
                              th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'"></span>
                    </h5>
                </div>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
