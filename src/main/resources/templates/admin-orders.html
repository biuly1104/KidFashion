<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">📦 Quản lý đơn hàng</h2>
            <p class="text-muted mb-0">Danh sách toàn bộ đơn hàng trong hệ thống.</p>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">

            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>SĐT</th>
                    <th>Thanh toán</th>
                    <th>Tổng tiền</th>
                    <th>Ngày đặt</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Cập nhật</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="8" class="text-center py-4 text-muted">
                        Chưa có đơn hàng nào.
                    </td>
                </tr>

                <tr th:each="o : ${orders}">
                    <td class="ps-3 fw-semibold" th:text="${o.id}"></td>
                    <td th:text="${o.customerName}"></td>
                    <td th:text="${o.phone}"></td>
                    <td th:text="${o.paymentMethod}"></td>
                    <td class="text-danger fw-bold"
                        th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                    </td>
                    <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <span class="badge bg-secondary" th:text="${o.status}"></span>
                    </td>
                    <td class="text-center">
                        <form th:action="@{/admin/orders/update-status}" method="post" class="d-flex gap-2 justify-content-center">
                            <input type="hidden" name="id" th:value="${o.id}">

                            <select name="status" class="form-select form-select-sm" style="width: 150px;">
                                <option value="Đã đặt" th:selected="${o.status == 'Đã đặt'}">Đã đặt</option>
                                <option value="Đang xử lý" th:selected="${o.status == 'Đang xử lý'}">Đang xử lý</option>
                                <option value="Đang giao" th:selected="${o.status == 'Đang giao'}">Đang giao</option>
                                <option value="Hoàn thành" th:selected="${o.status == 'Hoàn thành'}">Hoàn thành</option>
                                <option value="Đã hủy" th:selected="${o.status == 'Đã hủy'}">Đã hủy</option>
                            </select>

                            <button type="submit" class="btn btn-sm btn-primary">
                                Lưu
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
