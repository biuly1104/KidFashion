<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4">➕ Thêm sản phẩm</h2>

        <form action="/products/save"
              method="post"
              enctype="multipart/form-data"
              th:object="${product}">

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" placeholder="Nhập tên sản phẩm" class="form-control"/>
            </div>

            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select th:field="*{category}" class="form-select">
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}"
                            th:text="${c.name}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Giá</label>
                <input type="number" step="0.01" th:field="*{price}" placeholder="Nhập giá sản phẩm" class="form-control"/>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea th:field="*{description}" placeholder="Nhập mô tả" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Chọn ảnh từ máy</label>
                <input type="file" name="fileImage" class="form-control" accept="image/*"/>
            </div>

            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" th:field="*{newest}">
                <label class="form-check-label">Sản phẩm mới nhất</label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" th:field="*{bestSeller}">
                <label class="form-check-label">Sản phẩm bán chạy</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Lưu</button>
                <a href="/products" class="btn btn-secondary">Quay lại</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
