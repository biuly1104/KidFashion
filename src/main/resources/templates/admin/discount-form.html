<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm mã giảm giá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="card shadow-sm border-0 p-4">
        <h2 class="mb-4">➕ Thêm mã giảm giá</h2>

        <form th:action="@{/admin/discounts/save}" method="post" th:object="${discount}">
            <div class="mb-3">
                <label class="form-label">Mã giảm giá</label>
                <input type="text"
                       th:field="*{code}"
                       class="form-control"
                       placeholder="Ví dụ: SALE10"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phần trăm giảm (%)</label>
                <input type="number"
                       step="0.01"
                       th:field="*{percent}"
                       class="form-control"
                       placeholder="Ví dụ: 10"
                       required>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" th:field="*{active}">
                <label class="form-check-label">Kích hoạt mã giảm giá</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Lưu</button>
                <a th:href="@{/admin/discounts}" class="btn btn-secondary">Quay lại</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
