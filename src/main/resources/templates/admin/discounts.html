<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý mã giảm giá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1">🏷️ Quản lý mã giảm giá</h2>
            <p class="text-muted mb-0">Danh sách các mã giảm giá trong hệ thống.</p>
        </div>

        <a th:href="@{/admin/discounts/add}" class="btn btn-success">
            + Thêm mã giảm giá
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">Mã</th>
                    <th>Phần trăm giảm</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(discounts)}">
                    <td colspan="4" class="text-center py-4 text-muted">
                        Chưa có mã giảm giá nào.
                    </td>
                </tr>

                <tr th:each="d : ${discounts}">
                    <td class="ps-3 fw-semibold" th:text="${d.code}"></td>

                    <td th:text="${d.percent} + '%'"></td>

                    <td>
                        <span th:if="${d.active}" class="badge bg-success">Đang hoạt động</span>
                        <span th:if="${!d.active}" class="badge bg-secondary">Đã tắt</span>
                    </td>

                    <td class="text-center">
                        <a th:href="@{'/admin/discounts/delete/' + ${d.id}}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Bạn có chắc muốn xóa mã giảm giá này?')">
                            Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
