<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="card shadow p-4" style="border-radius:15px;">

        <h3 class="mb-4">👤 Thông tin tài khoản</h3>

        <div class="mb-3">
            <b>Tên đăng nhập:</b>
            <span class="ms-2" th:text="${user.username}"></span>
        </div>

        <div class="mb-3">
            <b>Vai trò:</b>
            <span class="ms-2 text-success fw-bold" th:text="${user.role}"></span>
        </div>

        <hr>

        <div class="d-flex gap-2 flex-wrap">
            <a href="/orders" class="btn btn-primary">
                📦 Đơn hàng của tôi
            </a>

            <a href="/logout" class="btn btn-danger">
                🚪 Đăng xuất
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
