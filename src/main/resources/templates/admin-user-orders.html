<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đơn hàng của người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:90px; background:#f5f5f5;">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📦 Đơn hàng của: <span th:text="${selectedUser.username}"></span></h2>

        <a href="/admin/users" class="btn btn-secondary">← Quay lại</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">

            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Mã đơn</th>
                    <th>Ngày</th>
                    <th>Tổng tiền</th>
                    <th>Thanh toán</th>
                    <th>Trạng thái</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(orders)}">
                    <td colspan="5" class="text-center py-4 text-muted">
                        Người dùng này chưa có đơn hàng.
                    </td>
                </tr>

                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>

                    <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                    <td class="text-danger fw-bold"
                        th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">
                    </td>

                    <td th:text="${o.paymentMethod}"></td>

                    <td>
                        <span class="badge bg-secondary" th:text="${o.status}"></span>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
